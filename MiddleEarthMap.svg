      <text x="70" y="75" font-size="14" font-weight="600" fill="#576574">Cost 1 (Solid Line)</text>
      
      <line x1="15" y1="110" x2="60" y2="110" stroke="#555" stroke-width="4" stroke-dasharray="6,4" />
      <text x="70" y="115" font-size="14" font-weight="600" fill="#576574">Cost 2 (Dashed Line)</text>
    </g>

    <g transform="translate(600, 0)">
