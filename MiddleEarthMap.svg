        <text x="0" y="43" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">Minas Morgul</text>
        <circle r="20" fill="#eb3b5a" stroke="#ffffff" stroke-width="3" filter="url(#shadow)" />
