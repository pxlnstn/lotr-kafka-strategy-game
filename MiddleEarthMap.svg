        <use href="#icon-mountains" x="0" y="0" transform="scale(0.6)" />
        <text x="20" y="5" font-size="14" font-weight="600" fill="#576574">Mountains</text>
      </g>

      <g transform="translate(220, 55)">
        <circle cx="0" cy="0" r="12" fill="#7f8fa6" />
