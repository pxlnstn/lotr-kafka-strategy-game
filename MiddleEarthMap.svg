  <g id="legends" transform="translate(0, 830)">
    
    <g transform="translate(100, 0)">
      <rect x="0" y="0" width="220" height="140" rx="8" fill="#ffffff" stroke="#dcdde1" stroke-width="2" filter="url(#box-shadow)"/>
      <text x="15" y="30" font-size="15" font-weight="bold" fill="#2c3e50">Start Control</text>
      
      <circle cx="25" cy="60" r="8" fill="#4b7bec" stroke="#fff" stroke-width="1.5" />
      <text x="45" y="65" font-size="14" font-weight="600" fill="#576574">Free Peoples</text>
      
      <circle cx="25" cy="90" r="8" fill="#eb3b5a" stroke="#fff" stroke-width="1.5" />
      <text x="45" y="95" font-size="14" font-weight="600" fill="#576574">Shadow</text>
      
      <circle cx="25" cy="120" r="8" fill="#a5b1c2" stroke="#fff" stroke-width="1.5" />
