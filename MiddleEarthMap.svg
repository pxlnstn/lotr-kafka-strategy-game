        <text x="0" y="-31" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">Bree</text>
        <circle r="20" fill="#a5b1c2" stroke="#ffffff" stroke-width="3" filter="url(#shadow)" />
