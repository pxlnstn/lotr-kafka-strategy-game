events {}

http {
  upstream engines {
    server go-1:8080;
    server go-2:8080;
    server go-3:8080;
  }

  server {
    listen 8080;

    location / {
      proxy_pass http://engines;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Connection "";
      # Required so Server-Sent Events stream through instead of buffering.
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 3600s;
    }
  }
}
