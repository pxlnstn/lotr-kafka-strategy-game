events {}

http {
  upstream engines {
    # Sticky sessions: a given client always talks to the same engine, so its
    # live stream and its state reads stay consistent. On backend failure nginx
    # rehashes to a survivor, so fault tolerance still works.
    ip_hash;
    server go-1:8080;
    server go-2:8080;
    server go-3:8080;
  }

  server {
    listen 8080;

    location / {
      proxy_pass http://engines;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Connection "";
      # Required so Server-Sent Events stream through instead of buffering.
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 3600s;
    }
  }
}
